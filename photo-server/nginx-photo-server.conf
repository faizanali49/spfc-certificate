# photo-server/nginx-photo-server.conf
#
# Reverse proxy config for the photo server, so it's reachable through
# your normal domain over HTTPS instead of a raw port number.
#
# OPTION 1 — Subdomain (recommended): photos.poli.com
# Add this as its own server block, alongside your existing site configs.
#
# OPTION 2 — Subpath on your main domain: poli.com/photo-api/
# See the commented-out alternative location block further below.

server {
    listen 80;
    server_name photos.poli.com;

    location / {
        proxy_pass http://localhost:4001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Allow larger request bodies for photo uploads (a little headroom
        # above the 3MB app-level limit set in server.js)
        client_max_body_size 5M;
    }
}

# ── OPTION 2: subpath instead of subdomain ──────────────────────
# If you'd rather not use a subdomain, add this location block inside
# your EXISTING server block for poli.com instead of the block above:
#
# location /photo-api/ {
#     rewrite ^/photo-api/(.*)$ /$1 break;
#     proxy_pass http://localhost:4001;
